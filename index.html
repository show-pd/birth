<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:sans-serif;
background:#fff5f8;
text-align:center;
overflow-x:hidden;
}

/* 共通画面 */
.screen{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
background-size:cover;
background-position:center;
}

/* スタート背景 */
#start{
background-image:url("start.JPG");
}

/* クリア背景 */
#clear{
display:none;
background-image:url("clear.JPG");
}

/* ゲーム画面 */
#game{
display:none;
}

h1{
color:#ff6b9d;
}

button{
background:#ff6b9d;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:30px;
margin-top:20px;
cursor:pointer;
}

/* グリッド */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
width:90vw;
max-width:360px;
margin:20px auto;
}

/* カード */

.card{
position:relative;
width:100%;
aspect-ratio:1/1;
cursor:pointer;
}

/* 写真 */

.card img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
}

/* カバー */

.back{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ffb3cc;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
}

/* 開いた状態 */

.open .back{
display:none;
}

/* 紙吹雪 */

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<!-- スタート -->

<div id="start" class="screen">

<h1>Happy Birthday 🎂</h1>

<p>写真ゲームをクリアしてね</p>

<button onclick="startGame()">はじめる</button>

</div>


<!-- ゲーム -->

<div id="game" class="screen">

<p>同じ写真を揃えてね</p>

<div class="grid" id="grid"></div>

</div>


<!-- クリア -->

<div id="clear" class="screen">

<h2>🎉 おめでとう 🎉</h2>

<p style="line-height:1.8">

いつも本当にありがとう。<br>
あなたがいるだけで<br>
毎日が特別になります。<br><br>

これからも<br>
たくさん笑って過ごそうね。

</p>

</div>


<canvas id="confetti"></canvas>

<script>

const photos=[
"image1.JPG",
"image2.JPG",
"image3.JPG",
"image4.JPG",
"image5.JPG",
"image6.JPG"
];

let deck=[];
let first=null;
let lock=false;
let match=0;

function startGame(){

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="flex";

const grid=document.getElementById("grid");
grid.innerHTML="";

deck=[...photos,...photos];

deck.sort(()=>Math.random()-0.5);

deck.forEach(src=>{

const card=document.createElement("div");
card.className="card";
card.dataset.img=src;

card.innerHTML=`
<img src="${src}">
<div class="back">❤️</div>
`;

card.addEventListener("click",()=>flip(card));

grid.appendChild(card);

});

}

function flip(card){

if(lock) return;

if(card.classList.contains("open")) return;

card.classList.add("open");

if(!first){

first=card;
return;

}

lock=true;

if(first.dataset.img===card.dataset.img){

match++;

first=null;
lock=false;

if(match===6){

setTimeout(showClear,600);

}

}else{

setTimeout(()=>{

card.classList.remove("open");
first.classList.remove("open");

first=null;
lock=false;

},800);

}

}

function showClear(){

document.getElementById("game").style.display="none";
document.getElementById("clear").style.display="flex";

startConfetti();

}

function startConfetti(){

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<120;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height-canvas.height,
size:8+Math.random()*8,
speed:2+Math.random()*3,
color:`hsl(${Math.random()*360},100%,70%)`
});

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

p.y+=p.speed;

if(p.y>canvas.height){
p.y=-10;
}

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,p.size,p.size);

});

requestAnimationFrame(update);

}

update();

}

</script>

</body>
</html>
